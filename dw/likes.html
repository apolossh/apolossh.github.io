<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LikesFF Panel</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

body{
background:#0f172a;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:520px;
background:#020617;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
overflow:hidden;
}

.header{
background:#1e293b;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.body{
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
}

.input,select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
outline:none;
}

.button{
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:#fff;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.status{
text-align:center;
font-size:13px;
}

.footer{
text-align:center;
font-size:11px;
padding:10px;
background:#020617;
opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
LikesFF Panel
</div>

<div class="body">

<input id="uid" class="input" placeholder="Digite o UID">

<select id="mode">
<option value="manual">📦 MANUAL : 20-220 LIKES</option>
<option value="440">🤖 PEDIDO : 440 LIKES</option>
<option value="660">🤖 PEDIDO : 660 LIKES</option>
<option value="880">🤖 PEDIDO : 880 LIKES</option>
<option value="1100">🤖 PEDIDO : 1100 LIKES</option>
<option value="2200">🤖 PEDIDO : 2200 LIKES</option>
<option value="3300">🤖 PEDIDO : 3300 LIKES</option>
<option value="4400">🤖 PEDIDO : 4400 LIKES</option>
<option value="5500">🤖 PEDIDO : 5500 LIKES</option>
<option value="11000">🤖 PEDIDO : 11000 LIKES</option>
</select>

<button id="send" class="button">Enviar Pedido</button>

<div id="status" class="status">
Aguardando...
</div>

</div>

<div class="footer">
LikesFF API
</div>

</div>

<iframe id="apiFrame" style="display:none"></iframe>

<script>

document.getElementById("send").onclick=()=>{

const uid=document.getElementById("uid").value.trim()
const option=document.getElementById("mode").value
const status=document.getElementById("status")

if(!uid){
status.innerText="Digite um UID válido"
return
}

let url=""

if(option==="manual"){
url=`https://likesff.online/api/LIKE?uid=${uid}&cache=true&key=LIKESFF-Panel-key-bielmotam&region=BR`
}else{
url=`https://likesff.online/api/LIKE?id=${uid}&key=LIKESFF-Panel-key-bielmotam&mode=process_add&likes=${option}&region=BR`
}

status.innerText="Enviando requisição..."

document.getElementById("apiFrame").src=url

setTimeout(()=>{
status.innerText="Pedido enviado (verifique no jogo)"
},2000)

}

</script>

</body>
</html>
