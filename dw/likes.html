<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LikesFF Panel</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}

body{
background:#0f172a;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:520px;
background:#020617;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
overflow:hidden;
}

.header{
background:#1e293b;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.body{
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
}

.input,select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
outline:none;
}

.button{
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:#fff;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.status{
text-align:center;
font-size:13px;
}

.results{
margin-top:10px;
display:flex;
flex-direction:column;
gap:14px;
}

.profile{
background:#0f172a;
border-radius:12px;
padding:14px;
display:flex;
flex-direction:column;
gap:6px;
}

.nickname{
font-size:18px;
font-weight:bold;
}

.uid{
font-size:12px;
opacity:0.7;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:#0b1220;
padding:12px;
border-radius:10px;
text-align:center;
}

.title{
font-size:11px;
opacity:0.7;
margin-bottom:4px;
}

.value{
font-size:18px;
font-weight:bold;
}

.small{
font-size:13px;
}

.footer{
text-align:center;
font-size:11px;
padding:10px;
background:#020617;
opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
LikesFF Panel
</div>

<div class="body">

<input id="uid" class="input" placeholder="Digite o UID">

<select id="mode">
<option value="manual">📦 MANUAL : 20-220 LIKES</option>
<option value="440">🤖 PEDIDO : 440 LIKES</option>
<option value="660">🤖 PEDIDO : 660 LIKES</option>
<option value="880">🤖 PEDIDO : 880 LIKES</option>
<option value="1100">🤖 PEDIDO : 1100 LIKES</option>
<option value="2200">🤖 PEDIDO : 2200 LIKES</option>
<option value="3300">🤖 PEDIDO : 3300 LIKES</option>
<option value="4400">🤖 PEDIDO : 4400 LIKES</option>
<option value="5500">🤖 PEDIDO : 5500 LIKES</option>
<option value="11000">🤖 PEDIDO : 11000 LIKES</option>
</select>

<button id="send" class="button">Enviar Pedido</button>

<div id="status" class="status">
Aguardando...
</div>

<div id="results" class="results"></div>

</div>

<div class="footer">
LikesFF API
</div>

</div>

<script>

document.getElementById("send").onclick = async ()=>{

const uid=document.getElementById("uid").value.trim()
const option=document.getElementById("mode").value
const status=document.getElementById("status")
const results=document.getElementById("results")

if(!uid){
status.innerText="Digite um UID válido"
return
}

let url=""

if(option==="manual"){
url=`https://likesff.online/api/LIKE?uid=${uid}&cache=true&key=LIKESFF-Panel-key-bielmotam&region=BR`
}else{
url=`https://likesff.online/api/LIKE?id=${uid}&key=LIKESFF-Panel-key-bielmotam&mode=process_add&likes=${option}&region=BR`
}

status.innerText="Enviando..."
results.innerHTML=""

try{

const res=await fetch(url)
const data=await res.json()

if(data.status==="failed"){

status.innerText=data.message||"Erro"

results.innerHTML=`
<div class="profile">
<div class="nickname">Erro no Pedido</div>
<div class="uid">UID: ${data.id||uid}</div>
</div>

<div class="card">
<div class="title">Mensagem</div>
<div class="value small">${data.res||"Falha no processamento"}</div>
</div>
`

return
}

status.innerText=data.message||"Sucesso"

if(data.nickname){

results.innerHTML=`
<div class="profile">
<div class="nickname">${data.nickname}</div>
<div class="uid">UID: ${data.id||uid} • Região: ${data.region||"-"}</div>
</div>

<div class="stats">

<div class="card">
<div class="title">Likes Antes</div>
<div class="value">${data.likes_before??"-"}</div>
</div>

<div class="card">
<div class="title">Likes Depois</div>
<div class="value">${data.likes_end??"-"}</div>
</div>

<div class="card">
<div class="title">Likes Enviados</div>
<div class="value">${data.likes_added??"-"}</div>
</div>

<div class="card">
<div class="title">Falhas</div>
<div class="value">${data.likes_failed??"-"}</div>
</div>

<div class="card">
<div class="title">Key Uso</div>
<div class="value small">${data.key??"-"}</div>
</div>

<div class="card">
<div class="title">Restante</div>
<div class="value">${data.key_remaining??"-"}</div>
</div>

<div class="card">
<div class="title">Key Mensagem</div>
<div class="value small">${data.key_message??"-"}</div>
</div>

<div class="card">
<div class="title">Likes Necessários</div>
<div class="value">${data.likes_required??"-"}</div>
</div>

</div>
`

}else{

results.innerHTML=`
<div class="profile">
<div class="nickname">Pedido Criado</div>
<div class="uid">UID: ${data.id||uid}</div>
</div>

<div class="stats">

<div class="card">
<div class="title">Likes Solicitados</div>
<div class="value">${data.likes??"-"}</div>
</div>

<div class="card">
<div class="title">Status</div>
<div class="value small">${data.res||"-"}</div>
</div>

</div>
`

}

}catch{

status.innerText="Erro na requisição"

}

}

</script>

</body>
</html>
