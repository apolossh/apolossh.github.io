<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bookmarklet Tester</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top));
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            min-height: 100vh;
        }
        main {
            width: 100%;
            max-width: 100%;
        }
        h1 {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 5px;
            color: #ffffff;
        }
        p {
            font-size: 0.85rem;
            color: #8e8e93;
            margin-bottom: 25px;
        }
        .sandbox {
            background-color: #000000;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .test-element {
            padding: 16px;
            background-color: #000000;
            border: 1px solid #1c1c1e;
            border-radius: 10px;
        }
        #target-text {
            font-size: 1rem;
            color: #ffffff;
            margin: 0;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #1c1c1e;
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            -webkit-appearance: none;
        }
        input[type="text"]:focus {
            outline: none;
            background: #2c2c2e;
        }
        textarea {
            width: 100%;
            height: 140px;
            padding: 12px;
            background: #1c1c1e;
            border: 1px solid #2c2c2e;
            border-radius: 8px;
            color: #30d158;
            font-family: ui-monospace, SFMono-Regular, SF Pro Text, Menlo, Monaco, Consolas, monospace;
            font-size: 0.9rem;
            resize: none;
            -webkit-appearance: none;
        }
        textarea:focus {
            outline: none;
            border-color: #30d158;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 5px;
            -webkit-appearance: none;
        }
        button:active {
            opacity: 0.8;
        }
        .console-container {
            margin-top: 5px;
        }
        .console-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .console-title {
            font-size: 0.85rem;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #ff453a;
            font-size: 0.85rem;
            padding: 4px 8px;
            margin: 0;
            width: auto;
            font-weight: 400;
        }
        .clear-btn:active {
            opacity: 0.6;
        }
        #console-log {
            width: 100%;
            min-height: 150px;
            max-height: 250px;
            background: #000000;
            border: 1px solid #1c1c1e;
            border-radius: 10px;
            padding: 12px;
            font-family: ui-monospace, SFMono-Regular, SF Pro Text, Menlo, Monaco, Consolas, monospace;
            font-size: 0.85rem;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-line {
            margin-bottom: 6px;
            border-bottom: 1px solid #111111;
            padding-bottom: 4px;
        }
        .log-log { color: #ffffff; }
        .log-error { color: #ff453a; }
        .log-warn { color: #ffd60a; }
        .log-info { color: #0a84ff; }
    </style>
</head>
<body>

    <main>
        <h1>iOS Sandbox</h1>
        <p>Ambiente otimizado para Safari / WebKit no iPhone.</p>

        <section class="sandbox">
            <div class="test-element">
                <textarea id="js-code" placeholder="Cole qualquer formato de script (bruto, IIFE, URL encoded, javascript:...) aqui..." autocapitalize="none" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
                <button onclick="runScript()">Executar Script</button>
            </div>

            <div class="test-element" id="target-area">
                <p id="target-text">Texto de teste do DOM</p>
            </div>

            <div class="test-element">
                <input type="text" id="target-input" placeholder="Toque para testar teclado/inputs...">
            </div>

            <div class="console-container">
                <div class="console-header">
                    <span class="console-title">Console Output</span>
                    <button class="clear-btn" onclick="clearConsole()">Limpar</button>
                </div>
                <div id="console-log"></div>
            </div>
        </section>
    </main>

    <script>
        (function() {
            const consoleLogDiv = document.getElementById('console-log');
            
            function appendLog(message, type) {
                const line = document.createElement('div');
                line.className = `log-line log-${type}`;
                
                if (typeof message === 'object') {
                    try {
                        line.textContent = `[Object] ${JSON.stringify(message, null, 2)}`;
                    } catch (e) {
                        line.textContent = `[Object] ${message.toString()}`;
                    }
                } else {
                    line.textContent = message;
                }
                
                consoleLogDiv.appendChild(line);
                consoleLogDiv.scrollTop = consoleLogDiv.scrollHeight;
            }

            const originalLog = console.log;
            const originalError = console.error;
            const originalWarn = console.warn;
            const originalInfo = console.info;

            console.log = function(...args) {
                originalLog.apply(console, args);
                appendLog(args.join(' '), 'log');
            };

            console.error = function(...args) {
                originalError.apply(console, args);
                appendLog(args.join(' '), 'error');
            };

            console.warn = function(...args) {
                originalWarn.apply(console, args);
                appendLog(args.join(' '), 'warn');
            };

            console.info = function(...args) {
                originalInfo.apply(console, args);
                appendLog(args.join(' '), 'info');
            };

            window.addEventListener('error', function(e) {
                appendLog(`${e.message} em ${e.filename}:${e.lineno}`, 'error');
            });
        })();

        function clearConsole() {
            document.getElementById('console-log').innerHTML = '';
        }

        function runScript() {
            const rawInput = document.getElementById('js-code').value;
            if (!rawInput.trim()) return;
            
            let processedCode = rawInput.trim();

            if (processedCode.toLowerCase().startsWith('javascript:')) {
                processedCode = processedCode.substring(11).trim();
            }

            try {
                processedCode = decodeURIComponent(processedCode);
            } catch (e) {
                try {
                    processedCode = decodeURI(processedCode);
                } catch (innerError) {}
            }

            processedCode = processedCode.trim();

            if (processedCode.startsWith('%')) {
                try {
                    processedCode = decodeURIComponent(processedCode);
                } catch (e) {}
            }

            try {
                const scriptElement = document.createElement('script');
                scriptElement.type = 'text/javascript';
                scriptElement.text = `(function(){
                    try {
                        ${processedCode}
                    } catch(err) {
                        console.error('Erro de Runtime: ' + err.message);
                    }
                })();`;
                
                document.body.appendChild(scriptElement);
                document.body.removeChild(scriptElement);
            } catch (err) {
                console.error('Erro de Compilação: ' + err.message);
            }
        }
    </script>
</body>
</html>
