<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LikesFF API</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, sans-serif;
}

body{
background:#0f172a;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:#020617;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,0.5);
overflow:hidden;
}

.header{
background:#1e293b;
padding:18px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.body{
padding:16px;
display:flex;
flex-direction:column;
gap:12px;
}

.input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
outline:none;
font-size:15px;
}

.button{
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:#fff;
font-size:15px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

.button:hover{
background:#16a34a;
}

.status{
text-align:center;
font-size:13px;
}

.results{
margin-top:10px;
display:flex;
flex-direction:column;
gap:14px;
}

.profile{
background:#0f172a;
border-radius:12px;
padding:14px;
display:flex;
flex-direction:column;
gap:6px;
}

.nickname{
font-size:18px;
font-weight:bold;
}

.uid{
font-size:12px;
opacity:0.7;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.card{
background:#0b1220;
padding:12px;
border-radius:10px;
text-align:center;
}

.title{
font-size:11px;
opacity:0.7;
margin-bottom:4px;
}

.value{
font-size:18px;
font-weight:bold;
}

.small{
font-size:13px;
}

.footer{
text-align:center;
font-size:11px;
padding:10px;
background:#020617;
opacity:0.7;
}

@media (max-width:480px){

.container{
max-width:100%;
}

.stats{
grid-template-columns:1fr 1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">
LikesFF API
</div>

<div class="body">

<input id="uid" class="input" placeholder="Digite o UID">

<button id="send" class="button">
Enviar Likes
</button>

<div id="status" class="status">
Aguardando...
</div>

<div id="results" class="results"></div>

</div>

<div class="footer">
API Panel
</div>

</div>

<script>

document.getElementById("send").onclick = async ()=>{

const uid = document.getElementById("uid").value.trim()
const status = document.getElementById("status")
const results = document.getElementById("results")

if(!uid){
status.innerText="Digite um UID válido"
return
}

status.innerText="Enviando..."
results.innerHTML=""

try{

const res = await fetch(`https://likesff.online/api/LIKE?uid=${uid}&cache=true&key=LIKESFF-Panel-key-bielmotam&region=BR`)
const data = await res.json()

status.innerText=data.message

results.innerHTML = `
<div class="profile">
<div class="nickname">${data.nickname}</div>
<div class="uid">UID: ${data.id} • Região: ${data.region}</div>
</div>

<div class="stats">

<div class="card">
<div class="title">Likes Antes</div>
<div class="value">${data.likes_before}</div>
</div>

<div class="card">
<div class="title">Likes Depois</div>
<div class="value">${data.likes_end}</div>
</div>

<div class="card">
<div class="title">Likes Enviados</div>
<div class="value">${data.likes_added}</div>
</div>

<div class="card">
<div class="title">Falhas</div>
<div class="value">${data.likes_failed}</div>
</div>

<div class="card">
<div class="title">Key Uso</div>
<div class="value small">${data.key}</div>
</div>

<div class="card">
<div class="title">Restante</div>
<div class="value">${data.key_remaining}</div>
</div>

</div>
`

}catch{

status.innerText="Erro na requisição"

}

}

</script>

</body>
</html>
